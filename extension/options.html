<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nurse Cockpit — Seek assist · Settings</title>
    <style>
      body { font: 14px system-ui, sans-serif; max-width: 460px; margin: 24px auto; padding: 0 16px; color: #0f172a; }
      h1 { font-size: 18px; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; font-size: 13px; }
      input { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font: inherit; }
      button { margin-top: 16px; padding: 8px 14px; background: #0f172a; color: #fff; border: 0; border-radius: 6px; font: inherit; cursor: pointer; }
      .hint { color: #64748b; font-size: 12px; margin-top: 4px; }
      .saved { color: #059669; margin-left: 10px; }
    </style>
  </head>
  <body>
    <h1>Nurse Cockpit — Seek assist</h1>
    <label for="cockpitUrl">Cockpit URL</label>
    <input id="cockpitUrl" placeholder="https://nurse-apply-cockpit.vercel.app" />
    <div class="hint">Must also be listed in the manifest host_permissions.</div>

    <label for="driverToken">Driver token</label>
    <input id="driverToken" type="password" placeholder="matches the cockpit's DRIVER_TOKEN env var" />
    <div class="hint">Stored only in this browser (chrome.storage.local).</div>

    <button id="save">Save</button><span id="status" class="saved"></span>
    <script src="options.js"></script>
  </body>
</html>
